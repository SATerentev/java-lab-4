<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кто хочет стать миллионером?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="success-flash" aria-hidden="true"></div>
    <div class="game-layout">
        <div id="hints-panel" class="hints-panel">
            <h3>Подсказки</h3>
            <div class="hints-grid">
                <button id="hint-friend-call" class="hint-btn" title="Звонок другу">
                    <span class="hint-icon">☎️</span>
                    <span class="hint-name">Звонок<br>другу</span>
                </button>
                <button id="hint-ask-audience" class="hint-btn" title="Помощь зала">
                    <span class="hint-icon">👥</span>
                    <span class="hint-name">Помощь<br>зала</span>
                </button>
                <button id="hint-fifty-fifty" class="hint-btn" title="50 на 50">
                    <span class="hint-icon">5️⃣0️⃣</span>
                    <span class="hint-name">50<br>на 50</span>
                </button>
                <button id="hint-change-question" class="hint-btn" title="Поменять вопрос">
                    <span class="hint-icon">🔄</span>
                    <span class="hint-name">Поменять<br>вопрос</span>
                </button>
                <button id="hint-make-mistake" class="hint-btn" title="Право на ошибку">
                    <span class="hint-icon">❌</span>
                    <span class="hint-name">Право на<br>ошибку</span>
                </button>
            </div>
        </div>

        <div id="game-container">
            <h1>Кто хочет стать миллионером?</h1>
            
            <div id="status-panel">
                <p>Игрок: <span id="playerName">...</span></p>
                <p>Счет: <span id="score">0</span></p>
                <p>Несгораемая сумма: <span id="safeAmount">0</span></p>
            </div>

            <p id="message" class="message"></p>

            <div id="question-section">
                <h2 id="questionText">Загрузка вопроса...</h2>
                <div class="answers-grid">
                    <button class="ans-btn" data-answer="1" id="ans1"></button>
                    <button class="ans-btn" data-answer="2" id="ans2"></button>
                    <button class="ans-btn" data-answer="3" id="ans3"></button>
                    <button class="ans-btn" data-answer="4" id="ans4"></button>
                </div>
            </div>

            <div id="game-over" style="display: none;">
                <h2>Игра окончена</h2>
                <p id="final-result"></p>
                <p id="correct-answers-result"></p>
                <a class="home-link" href="index.html">Начать заново</a>
            </div>
        </div>

        <div id="prize-ladder">
            <h3>Таблица выигрышей</h3>
            <ul id="prize-list"></ul>
        </div>
    </div>

    <!-- Модальные окна для подсказок -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-window">
            <button class="modal-close">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080/api";
        const PRIZE_TABLE = [
            0,
            500,
            1000,
            2000,
            3000,
            5000,
            10000,
            15000,
            25000,
            50000,
            100000,
            200000,
            400000,
            800000,
            1500000,
            3000000
        ];
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get("gameId");
        const messageEl = document.getElementById("message");
        const questionSectionEl = document.getElementById("question-section");
        const gameOverEl = document.getElementById("game-over");
        const questionTextEl = document.getElementById("questionText");
        const answerButtons = Array.from(document.querySelectorAll(".ans-btn"));
        const prizeListEl = document.getElementById("prize-list");
        const modalOverlay = document.getElementById("modal-overlay");
        const modalContent = document.getElementById("modal-content");
        const modalClose = document.querySelector(".modal-close");
        
        let previousScore = null;
        let audioCtx = null;
        let usedHints = new Set();
        let hiddenAnswers = new Set();

        function formatMoney(value) {
            return Number(value).toLocaleString("ru-RU");
        }

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function beep({ freq = 440, duration = 0.12, type = "sine", gain = 0.045, delay = 0 }) {
            try {
                const ctx = getAudioCtx();
                const now = ctx.currentTime + delay;
                const osc = ctx.createOscillator();
                const amp = ctx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);
                amp.gain.setValueAtTime(0.0001, now);
                amp.gain.exponentialRampToValueAtTime(gain, now + 0.015);
                amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);

                osc.connect(amp);
                amp.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + duration + 0.02);
            } catch (_) {
                // Audio can be blocked by browser policy until first interaction.
            }
        }

        function playCorrectSound() {
            beep({ freq: 660, duration: 0.08, type: "triangle", gain: 0.04, delay: 0 });
            beep({ freq: 880, duration: 0.09, type: "triangle", gain: 0.04, delay: 0.09 });
            beep({ freq: 1100, duration: 0.1, type: "triangle", gain: 0.04, delay: 0.18 });
        }

        function playLoseSound() {
            beep({ freq: 320, duration: 0.12, type: "sawtooth", gain: 0.04, delay: 0 });
            beep({ freq: 240, duration: 0.14, type: "sawtooth", gain: 0.04, delay: 0.11 });
            beep({ freq: 180, duration: 0.16, type: "sawtooth", gain: 0.035, delay: 0.23 });
        }

        function playWinSound() {
            beep({ freq: 784, duration: 0.1, type: "triangle", gain: 0.042, delay: 0 });
            beep({ freq: 988, duration: 0.11, type: "triangle", gain: 0.042, delay: 0.1 });
            beep({ freq: 1318, duration: 0.12, type: "triangle", gain: 0.042, delay: 0.22 });
            beep({ freq: 1568, duration: 0.16, type: "triangle", gain: 0.045, delay: 0.35 });
        }

        function renderPrizeLadder(currentScore) {
            prizeListEl.innerHTML = "";
            const scoreValue = Number(currentScore || 0);
            const shouldAnimate = previousScore !== null && scoreValue > previousScore;

            for (let i = PRIZE_TABLE.length - 1; i >= 0; i--) {
                const li = document.createElement("li");
                li.className = "prize-item";
                if (PRIZE_TABLE[i] === scoreValue) {
                    li.classList.add("active");
                    if (shouldAnimate) {
                        li.classList.add("just-hit");
                    }
                }
                li.textContent = `${i}. ${formatMoney(PRIZE_TABLE[i])}`;
                prizeListEl.appendChild(li);
            }

            previousScore = scoreValue;
        }

        function playSuccessFlash() {
            const flashEl = document.getElementById("success-flash");
            flashEl.classList.remove("show");
            void flashEl.offsetWidth;
            flashEl.classList.add("show");
        }

        function setMessage(text, type = "info") {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        function setAnswerButtonsEnabled(enabled) {
            answerButtons.forEach((button) => {
                if (!hiddenAnswers.has(button.id)) {
                    button.disabled = !enabled;
                }
            });
        }

        async function readErrorMessage(response) {
            try {
                return await response.text();
            } catch (_) {
                return "Неизвестная ошибка";
            }
        }

        function updateHintButtons(gameData) {
            usedHints.clear();
            if (gameData.usedHints) {
                gameData.usedHints.forEach(hint => usedHints.add(hint));
            }

            const maxHintsUsed = usedHints.size >= 4;
            
            document.getElementById("hint-friend-call").disabled = maxHintsUsed || usedHints.has("FriendCall");
            document.getElementById("hint-ask-audience").disabled = maxHintsUsed || usedHints.has("AskAudience");
            document.getElementById("hint-fifty-fifty").disabled = maxHintsUsed || usedHints.has("FiftyFifty");
            document.getElementById("hint-change-question").disabled = maxHintsUsed || usedHints.has("ChangeQuestion");
            document.getElementById("hint-make-mistake").disabled = maxHintsUsed || usedHints.has("MakeMistake");
        }

        function showModal(title, content, actionText = "Ок") {
            const contentHTML = content
                .split('\n')
                .map(line => line.trim())
                .filter(line => line)
                .join('<br>');
            
            modalContent.innerHTML = `
                <h3 class="modal-header">${title}</h3>
                <p class="modal-body">${contentHTML}</p>
                <div class="modal-action">
                    <button class="modal-btn">${actionText}</button>
                </div>
            `;
            modalOverlay.style.display = "flex";
            modalOverlay.querySelector(".modal-btn").focus();
        }

        function closeModal() {
            modalOverlay.style.display = "none";
        }

        modalClose.addEventListener("click", closeModal);
        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        if (!gameId) {
            alert("ID игры не найден");
            window.location.href = "index.html";
        }

        async function refreshGame() {
            try {
                const gameRes = await fetch(`${API_BASE}/game/${gameId}`);
                if (!gameRes.ok) {
                    const reason = await readErrorMessage(gameRes);
                    throw new Error(reason || "Не удалось получить состояние игры");
                }
                const gameData = await gameRes.json();

                document.getElementById("playerName").textContent = gameData.playerName;
                document.getElementById("score").textContent = formatMoney(gameData.score);
                document.getElementById("safeAmount").textContent = formatMoney(gameData.safeAmount);
                
                updateHintButtons(gameData);
                
                const oldScore = previousScore;
                renderPrizeLadder(gameData.score);
                if (oldScore !== null && Number(gameData.score) > oldScore) {
                    playSuccessFlash();
                    playCorrectSound();
                }

                if (gameData.finished) {
                    showGameOver(gameData);
                    return;
                }

                const questRes = await fetch(`${API_BASE}/game/${gameId}/question/get`);
                if (!questRes.ok) {
                    const reason = await readErrorMessage(questRes);
                    throw new Error(reason || "Не удалось загрузить вопрос");
                }
                const questData = await questRes.json();

                questionTextEl.textContent = questData.questionText;
                document.getElementById("ans1").textContent = `1) ${questData.answer1}`;
                document.getElementById("ans2").textContent = `2) ${questData.answer2}`;
                document.getElementById("ans3").textContent = `3) ${questData.answer3}`;
                document.getElementById("ans4").textContent = `4) ${questData.answer4}`;
                
                hiddenAnswers.clear();
                answerButtons.forEach(btn => btn.classList.remove("disabled-answer"));
                
                setMessage("Выберите ответ", "info");
                setAnswerButtonsEnabled(true);
            } catch (err) {
                setMessage(`Ошибка загрузки игры: ${err.message}`, "error");
                setAnswerButtonsEnabled(false);
            }
        }

        async function submitAnswer(answerIndex) {
            try {
                setAnswerButtonsEnabled(false);
                setMessage("Проверяем ответ...", "info");

                const res = await fetch(`${API_BASE}/game/submitAnswer`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        gameId: gameId,
                        answer: answerIndex
                    })
                });

                if (!res.ok) {
                    const reason = await readErrorMessage(res);
                    throw new Error(reason || "Не удалось отправить ответ");
                }

                const gameData = await res.json();
                updateHintButtons(gameData);
                
                if (gameData.finished) {
                    showGameOver(gameData);
                } else {
                    await refreshGame();
                }
            } catch (err) {
                setMessage(`Ошибка отправки ответа: ${err.message}`, "error");
                setAnswerButtonsEnabled(true);
            }
        }

        function showGameOver(data) {
            questionSectionEl.style.display = "none";
            gameOverEl.style.display = "block";
            setAnswerButtonsEnabled(false);
            setMessage("Игра завершена", "success");

            const finalResultEl = document.getElementById("final-result");
            const correctAnswersEl = document.getElementById("correct-answers-result");
            if (Number(data.payout) >= PRIZE_TABLE[PRIZE_TABLE.length - 1]) {
                finalResultEl.textContent =
                    `Вы заработали ${formatMoney(data.payout)}. Это максимальный выигрыш!`;
            } else {
                finalResultEl.textContent =
                    `Вы заработали ${formatMoney(data.score)}. Несгораемая сумма: ${formatMoney(data.safeAmount)}. Ваш выигрыш - ${formatMoney(data.payout)}.`;
            }
            correctAnswersEl.textContent = `Правильных ответов: ${data.correctAnswers}`;

            if (Number(data.payout) >= PRIZE_TABLE[PRIZE_TABLE.length - 1]) {
                playWinSound();
            } else {
                playLoseSound();
            }
        }

        async function useHint(hintName) {
            try {
                setAnswerButtonsEnabled(false);
                setMessage("Используем подсказку...", "info");

                const res = await fetch(`${API_BASE}/game/${gameId}/useHint`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ HintName: hintName })
                });

                if (!res.ok) {
                    const reason = await readErrorMessage(res);
                    throw new Error(reason || "Не удалось использовать подсказку");
                }

                const response = await res.json();

                if (hintName === "FriendCall") {
                    showModal("☎️ Звонок другу", `Друг сказал:\n${response.hintText}`);
                } else if (hintName === "AskAudience") {
                    showModal("👥 Помощь зала", `Зал говорит:\n${response.hintText}`);
                } else if (hintName === "FiftyFifty") {
                    const incorrect1 = response.firstIncorrectAnswer;
                    const incorrect2 = response.secondIncorrectAnswer;
                    
                    answerButtons.forEach(btn => {
                        const answerText = btn.textContent.substring(3).trim();
                        if (answerText === incorrect1 || answerText === incorrect2) {
                            btn.classList.add("disabled-answer");
                            btn.disabled = true;
                            hiddenAnswers.add(btn.id);
                        }
                    });
                    showModal("5️⃣0️⃣ 50 на 50", "Два неправильных ответа удалены!");
                } else if (hintName === "ChangeQuestion") {
                    const newQuestion = response.newQuestion;
                    questionTextEl.textContent = newQuestion.questionText;
                    document.getElementById("ans1").textContent = `1) ${newQuestion.answer1}`;
                    document.getElementById("ans2").textContent = `2) ${newQuestion.answer2}`;
                    document.getElementById("ans3").textContent = `3) ${newQuestion.answer3}`;
                    document.getElementById("ans4").textContent = `4) ${newQuestion.answer4}`;
                    
                    hiddenAnswers.clear();
                    answerButtons.forEach(btn => btn.classList.remove("disabled-answer"));
                    
                    showModal("🔄 Вопрос изменен", "Вам предоставлен новый вопрос!");
                }

                const gameRes = await fetch(`${API_BASE}/game/${gameId}`);
                if (gameRes.ok) {
                    const gameData = await gameRes.json();
                    updateHintButtons(gameData);
                }
                
                setMessage("Выберите ответ", "info");
                setAnswerButtonsEnabled(true);
            } catch (err) {
                setMessage(`Ошибка подсказки: ${err.message}`, "error");
                setAnswerButtonsEnabled(true);
            }
        }

        answerButtons.forEach((button) => {
            button.addEventListener("click", () => {
                if (!button.disabled) {
                    getAudioCtx().resume?.();
                    const answer = Number(button.dataset.answer);
                    submitAnswer(answer);
                }
            });
        });

        document.getElementById("hint-friend-call").addEventListener("click", () => {
            getAudioCtx().resume?.();
            useHint("FriendCall");
        });

        document.getElementById("hint-ask-audience").addEventListener("click", () => {
            getAudioCtx().resume?.();
            useHint("AskAudience");
        });

        document.getElementById("hint-fifty-fifty").addEventListener("click", () => {
            getAudioCtx().resume?.();
            useHint("FiftyFifty");
        });

        document.getElementById("hint-change-question").addEventListener("click", () => {
            getAudioCtx().resume?.();
            useHint("ChangeQuestion");
        });

        document.getElementById("hint-make-mistake").addEventListener("click", () => {
            getAudioCtx().resume?.();
            useHint("MakeMistake");
        });

        modalContent.addEventListener("click", (e) => {
            if (e.target.classList.contains("modal-btn")) {
                closeModal();
            }
        });

        refreshGame();
    </script>
</body>
</html>
